bundle:
  name: midas

variables:
  # ── App Config ──
  catalog:
    description: "Unity Catalog catalog for Midas to browse"
    default: midas_catalog
  warehouse_id:
    description: "SQL warehouse ID for telemetry writes and permission checks"
  serving_endpoint:
    description: "Foundation Model serving endpoint name"
    default: databricks-claude-sonnet-4-5

  # ── OTel Observability Config ──
  otel_enabled:
    description: "Enable OTel telemetry writes (true/false)"
    default: "true"
  otel_catalog:
    description: "Catalog for OTel tables (defaults to same as catalog)"
    default: ${var.catalog}
  otel_raw_schema:
    description: "Schema name for raw bronze OTel tables"
    default: otel_raw
  otel_observability_schema:
    description: "Schema name for processed silver/gold OTel tables"
    default: otel_observability

sync:
  include:
    - .build

artifacts:
  default:
    build: apx build

resources:
  apps:
    midas-app:
      name: "midas"
      description: "Midas - AI Metadata Generator for Unity Catalog & Genie"
      source_code_path: ./.build
      permissions:
        - user_name: ${workspace.current_user.userName}
          level: CAN_MANAGE

  schemas:
    otel_raw_schema:
      catalog_name: ${var.otel_catalog}
      name: ${var.otel_raw_schema}
      comment: "Raw OTel v2 OTLP bronze tables - spans, logs, metrics"

    otel_observability_schema:
      catalog_name: ${var.otel_catalog}
      name: ${var.otel_observability_schema}
      comment: "Processed OTel data - silver cleaned tables and gold analytics"

  pipelines:
    otel_pipeline:
      name: "midas-otel-observability"
      catalog: ${var.otel_catalog}
      target: ${var.otel_observability_schema}
      serverless: true
      channel: PREVIEW
      continuous: false
      libraries:
        - notebook:
            path: ./src/notebooks/dlt_pipeline.py
      configuration:
        otel.source.catalog: ${var.otel_catalog}
        otel.source.schema: ${var.otel_raw_schema}

  jobs:
    otel_setup:
      name: "midas-otel-setup-bronze"
      tasks:
        - task_key: setup_otel_v2
          notebook_task:
            notebook_path: ./src/notebooks/setup_otel_v2.py
            base_parameters:
              catalog: ${var.otel_catalog}
              raw_schema: ${var.otel_raw_schema}
              observability_schema: ${var.otel_observability_schema}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"

    otel_pipeline_schedule:
      name: "midas-otel-scheduled"
      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: "America/Los_Angeles"
      tasks:
        - task_key: run_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.otel_pipeline.id}

targets:
  dev:
    default: true
    workspace:
      profile: midas
    variables:
      catalog: midas_catalog
      warehouse_id: a6505a9626cf9ca7
      serving_endpoint: databricks-claude-sonnet-4-5
      otel_catalog: midas_catalog
      otel_raw_schema: otel_raw
      otel_observability_schema: otel_observability

  # Example: customer or second workspace
  # prod:
  #   workspace:
  #     profile: customer-workspace
  #   variables:
  #     catalog: main
  #     warehouse_id: xyz789
  #     serving_endpoint: databricks-claude-sonnet-4-5
  #     otel_enabled: "false"
